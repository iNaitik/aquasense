# A generic, single database configuration.

[alembic]
# path to migration scripts.
# Use forward slashes (/) also on Windows.
script_location = alembic

# SQLAlchemy URL — overridden at runtime in env.py from app settings,
# but Alembic requires *something* here to parse the ini file.
sqlalchemy.url = postgresql://postgres:password@localhost:5432/aquasense


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
